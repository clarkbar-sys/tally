<title>tally — spike</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F1ECDD">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root {
    --ink: #21201B;
    --paper: #F1ECDD;
    --surface: #FBF8F0;
    --surface-raised: #FFFFFF;
    --border: #DFD6BE;
    --wood: #96702E;
    --wood-strong: #7A5A22;
    --wood-on-dark: #D9A85C;
    --moss: #3F5F49;
    --rust: #963B26;
    --muted: #7A7364;
    --shadow: 0 1px 2px rgba(33,32,27,0.06), 0 1px 1px rgba(33,32,27,0.04);

    --font-display: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace;

    --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 24px; --sp-6: 32px; --sp-7: 48px;
    --radius-sm: 5px; --radius-md: 9px;
    color-scheme: light dark;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #ECE6D6;
      --paper: #17140F;
      --surface: #221D16;
      --surface-raised: #2A2419;
      --border: #3C3427;
      --wood: #D9A85C;
      --wood-strong: #E7BD7C;
      --moss: #86AC8F;
      --rust: #E08A6C;
      --muted: #B3A991;
      --shadow: 0 1px 2px rgba(0,0,0,0.35), 0 1px 1px rgba(0,0,0,0.25);
    }
  }
  :root[data-theme="dark"] {
    --ink: #ECE6D6; --paper: #17140F; --surface: #221D16; --surface-raised: #2A2419;
    --border: #3C3427; --wood: #D9A85C; --wood-strong: #E7BD7C; --moss: #86AC8F;
    --rust: #E08A6C; --muted: #B3A991; --shadow: 0 1px 2px rgba(0,0,0,0.35), 0 1px 1px rgba(0,0,0,0.25);
  }
  :root[data-theme="light"] {
    --ink: #21201B; --paper: #F1ECDD; --surface: #FBF8F0; --surface-raised: #FFFFFF;
    --border: #DFD6BE; --wood: #96702E; --wood-strong: #7A5A22; --moss: #3F5F49;
    --rust: #963B26; --muted: #7A7364; --shadow: 0 1px 2px rgba(33,32,27,0.06), 0 1px 1px rgba(33,32,27,0.04);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.45;
    overscroll-behavior-y: contain;
  }
  button, input, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  button { -webkit-appearance: none; appearance: none; background: none; border: none; cursor: pointer; }
  h1, h2, h3, p { margin: 0; }
  a { color: inherit; }

  #app {
    max-width: 560px;
    margin: 0 auto;
    min-height: 100%;
    padding-bottom: calc(var(--sp-7) + env(safe-area-inset-bottom));
    position: relative;
  }

  /* ---- header ---- */
  header.top {
    position: sticky; top: 0; z-index: 5;
    display: flex; align-items: center; gap: var(--sp-3);
    padding: calc(var(--sp-4) + env(safe-area-inset-top)) var(--sp-4) var(--sp-3);
    background: color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  header.top .back {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; margin-left: -6px;
    border-radius: 50%;
    color: var(--wood-strong);
  }
  header.top .back:active { background: var(--surface); }
  header.top h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.375rem;
    letter-spacing: 0.01em;
    text-wrap: balance;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  header.top .wordmark {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.5rem;
  }
  header.top .reset {
    font-family: var(--font-mono);
    font-size: 0.6875rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--muted);
    padding: var(--sp-2);
  }

  main { padding: var(--sp-4); }

  /* ---- tally list (home) ---- */
  .empty {
    margin-top: var(--sp-6);
    padding: var(--sp-6) var(--sp-4);
    text-align: center;
    color: var(--muted);
  }
  .empty .glyph { font-family: var(--font-display); font-size: 2rem; color: var(--wood); margin-bottom: var(--sp-2); }
  .empty p { font-size: 0.9375rem; max-width: 30ch; margin: 0 auto; }

  .list { display: flex; flex-direction: column; gap: var(--sp-3); }

  .card {
    display: block; width: 100%; text-align: left;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--sp-4);
    box-shadow: var(--shadow);
    transition: transform 0.12s ease, background 0.12s ease;
  }
  .card:active { transform: scale(0.985); background: var(--surface-raised); }

  .card .title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.0625rem;
    text-wrap: balance;
  }
  .card .meta {
    margin-top: var(--sp-2);
    display: flex; align-items: center; justify-content: space-between;
    gap: var(--sp-3);
  }
  .card .meta-text {
    font-size: 0.8125rem;
    color: var(--muted);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .tally-svg { color: var(--wood); flex-shrink: 0; }
  .tally-num {
    font-family: var(--font-mono); font-size: 0.8125rem; color: var(--wood-strong);
    font-variant-numeric: tabular-nums;
  }
  .card .next-chip {
    margin-top: var(--sp-3);
    display: inline-flex; align-items: center; gap: var(--sp-1);
    font-family: var(--font-mono); font-size: 0.75rem; font-variant-numeric: tabular-nums;
    padding: 3px var(--sp-2);
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .card .next-chip.overdue { color: var(--rust); border-color: color-mix(in srgb, var(--rust) 45%, var(--border)); }
  .card .next-chip.soon { color: var(--wood-strong); border-color: color-mix(in srgb, var(--wood) 45%, var(--border)); }

  /* ---- FAB ---- */
  .fab {
    position: fixed;
    right: max(var(--sp-5), calc(env(safe-area-inset-right) + var(--sp-4)));
    bottom: calc(var(--sp-5) + env(safe-area-inset-bottom));
    left: 0; margin: 0 auto; width: 58px; height: 58px;
    max-width: 560px;
    transform: translateX(calc((min(560px, 100vw) - var(--sp-5)*2 - 58px) / 2));
    background: var(--wood);
    color: var(--surface-raised);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(33,32,27,0.28);
    z-index: 6;
    transition: transform 0.12s ease;
  }
  .fab:active { transform: translateX(calc((min(560px, 100vw) - var(--sp-5)*2 - 58px) / 2)) scale(0.92); }
  .fab svg { width: 26px; height: 26px; }

  /* ---- sheet (new tally / add item) ---- */
  .scrim {
    position: fixed; inset: 0; background: rgba(20,18,12,0.42);
    z-index: 9; opacity: 0; pointer-events: none; transition: opacity 0.18s ease;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
    max-width: 560px; margin: 0 auto;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 16px 16px 0 0;
    padding: var(--sp-5) var(--sp-4) calc(var(--sp-5) + env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.22s cubic-bezier(.32,.72,0,1);
    box-shadow: 0 -4px 24px rgba(20,18,12,0.18);
  }
  .sheet.open { transform: translateY(0); }
  .sheet .handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto var(--sp-4); }
  .sheet h3 {
    font-family: var(--font-display); font-weight: 600; font-size: 1.0625rem; margin-bottom: var(--sp-3);
  }
  .field { display: flex; flex-direction: column; gap: var(--sp-2); margin-bottom: var(--sp-4); }
  .field label {
    font-family: var(--font-mono); font-size: 0.6875rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted);
  }
  .field input[type="text"], .field input[type="date"], .field textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: var(--sp-3);
    color: var(--ink);
    width: 100%;
  }
  .field input:focus, .field textarea:focus, button:focus-visible, .card:focus-visible, .fab:focus-visible, .checkbox:focus-visible {
    outline: 2px solid var(--wood); outline-offset: 2px;
  }
  .field textarea { min-height: 84px; resize: vertical; }
  .sheet-actions { display: flex; gap: var(--sp-3); }
  .btn {
    flex: 1;
    text-align: center;
    padding: var(--sp-3) var(--sp-4);
    border-radius: var(--radius-sm);
    font-weight: 600; font-size: 0.9375rem;
  }
  .btn.primary { background: var(--wood); color: var(--surface-raised); }
  .btn.primary:disabled { opacity: 0.45; }
  .btn.ghost { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

  /* ---- detail sections ---- */
  section.block { margin-bottom: var(--sp-6); }
  section.block .block-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: var(--sp-3);
    padding-bottom: var(--sp-2);
    border-bottom: 1px solid var(--border);
  }
  section.block .block-head h2 {
    font-family: var(--font-mono);
    font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted);
  }
  section.block .block-head .count { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); font-variant-numeric: tabular-nums; }

  .add-inline {
    display: flex; gap: var(--sp-2); margin-bottom: var(--sp-3);
  }
  .add-inline input[type="text"] {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: var(--sp-3); color: var(--ink);
  }
  .add-inline input[type="date"] {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: var(--sp-3); color: var(--ink);
    font-family: var(--font-mono); font-size: 0.875rem;
  }
  .add-inline button.go {
    width: 44px; flex-shrink: 0;
    background: var(--wood); color: var(--surface-raised);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
  }
  .add-inline button.go:disabled { opacity: 0.4; }

  .item-row {
    display: flex; align-items: flex-start; gap: var(--sp-3);
    padding: var(--sp-3) 0;
    border-bottom: 1px solid var(--border);
  }
  .item-row:last-child { border-bottom: none; }

  .checkbox {
    width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; margin-top: 1px;
    border: 1.5px solid var(--muted);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .checkbox.checked { background: var(--moss); border-color: var(--moss); }
  .checkbox svg { width: 14px; height: 14px; color: var(--surface-raised); opacity: 0; transition: opacity 0.12s ease; }
  .checkbox.checked svg { opacity: 1; }

  .item-text { flex: 1; min-width: 0; word-wrap: break-word; padding-top: 1px; }
  .item-row.done .item-text { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--border); }

  .note-card .item-text { white-space: pre-wrap; }
  .note-meta { font-family: var(--font-mono); font-size: 0.6875rem; color: var(--muted); margin-top: var(--sp-1); }

  .reminder-date {
    font-family: var(--font-mono); font-size: 0.75rem; font-variant-numeric: tabular-nums;
    padding: 2px var(--sp-2); border-radius: 999px; border: 1px solid var(--border); color: var(--muted);
    flex-shrink: 0; margin-top: 1px;
  }
  .reminder-date.overdue { color: var(--rust); border-color: color-mix(in srgb, var(--rust) 45%, var(--border)); }
  .reminder-date.soon { color: var(--wood-strong); border-color: color-mix(in srgb, var(--wood) 45%, var(--border)); }

  .del {
    width: 28px; height: 28px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); border-radius: 50%;
  }
  .del:active { background: var(--surface); color: var(--rust); }
  .del svg { width: 15px; height: 15px; }

  .block-empty { font-size: 0.8125rem; color: var(--muted); padding: var(--sp-2) 0; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>

<div id="app"></div>
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"></div>

<script>
(function () {
  "use strict";

  var STORE_KEY = "tally-spike-v1";
  var svgNS = "http://www.w3.org/2000/svg";

  function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function load() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { tallies: [] };
  }
  function save() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(db)); } catch (e) {}
  }

  var db = load();
  var route = { name: "home" };

  function seedIfEmpty() {
    if (db.tallies.length) return;
    var now = Date.now();
    db.tallies.push({
      id: uid(), title: "Kitchen renovation", createdAt: now, updatedAt: now,
      notes: [{ id: uid(), text: "Cabinet guy said 6 weeks out. Ask about the soft-close hinges upcharge before signing.", createdAt: now }],
      checklist: [
        { id: uid(), text: "Get second quote on countertops", done: false },
        { id: uid(), text: "Confirm electrician for the island outlet", done: true },
        { id: uid(), text: "Pick tile for backsplash", done: false }
      ],
      reminders: [{ id: uid(), text: "Cabinet deposit due", date: isoDaysFromNow(4) }]
    });
    db.tallies.push({
      id: uid(), title: "Costco run", createdAt: now - 1000, updatedAt: now - 1000,
      notes: [],
      checklist: [
        { id: uid(), text: "Paper towels", done: false },
        { id: uid(), text: "Rotisserie chicken", done: false },
        { id: uid(), text: "Propane refill", done: false }
      ],
      reminders: []
    });
    save();
  }

  function isoDaysFromNow(n) {
    var d = new Date();
    d.setDate(d.getDate() + n);
    return d.toISOString().slice(0, 10);
  }

  function findTally(id) {
    for (var i = 0; i < db.tallies.length; i++) if (db.tallies[i].id === id) return db.tallies[i];
    return null;
  }
  function touch(t) { t.updatedAt = Date.now(); save(); }

  /* ---- tally-mark count glyph: n strokes, every 5th a diagonal slash ---- */
  function tallyMarksSVG(n) {
    if (n <= 0) return "";
    if (n > 20) return '<span class="tally-num">' + n + " marks</span>";
    var h = 15, gap = 5, groupGap = 8, x = 0, lines = [];
    var groups = Math.ceil(n / 5);
    for (var g = 0; g < groups; g++) {
      var inGroup = Math.min(5, n - g * 5);
      var groupStartX = x;
      var strokes = Math.min(inGroup, 4);
      for (var i = 0; i < strokes; i++) {
        lines.push('<line x1="' + x + '" y1="1" x2="' + x + '" y2="' + h + '"/>');
        x += gap;
      }
      if (inGroup === 5) {
        lines.push('<line x1="' + (groupStartX - 2) + '" y1="' + (h + 1) + '" x2="' + (groupStartX + 3 * gap + 2) + '" y2="0"/>');
      } else {
        x -= gap;
        x += (strokes ? gap : 0);
      }
      x += groupGap;
    }
    var width = Math.max(x - groupGap, h);
    return '<svg class="tally-svg" viewBox="0 0 ' + width + " " + (h + 2) + '" width="' + width + '" height="' + (h + 2) +
      '" aria-hidden="true"><g stroke="currentColor" stroke-width="2" stroke-linecap="round">' + lines.join("") + "</g></svg>";
  }

  function fmtDate(iso) {
    var d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }
  function dateClass(iso) {
    var today = new Date(); today.setHours(0,0,0,0);
    var d = new Date(iso + "T00:00:00");
    var diffDays = Math.round((d - today) / 86400000);
    if (diffDays < 0) return "overdue";
    if (diffDays <= 3) return "soon";
    return "";
  }
  function nextReminder(t) {
    if (!t.reminders.length) return null;
    return t.reminders.slice().sort(function (a, b) { return a.date < b.date ? -1 : 1; })[0];
  }

  var ICON = {
    plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
    back: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>',
    check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg>',
    trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M9 6V4h6v2m-8 0l1 14h8l1-14"/></svg>',
    arrow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>'
  };

  var app = document.getElementById("app");
  var scrim = document.getElementById("scrim");
  var sheetEl = document.getElementById("sheet");

  function openSheet(html, focusSel) {
    sheetEl.innerHTML = '<div class="handle"></div>' + html;
    scrim.classList.add("open");
    sheetEl.classList.add("open");
    if (focusSel) setTimeout(function () {
      var f = sheetEl.querySelector(focusSel);
      if (f) f.focus();
    }, 80);
  }
  function closeSheet() {
    scrim.classList.remove("open");
    sheetEl.classList.remove("open");
  }
  scrim.addEventListener("click", closeSheet);

  function go(r) { route = r; render(); window.scrollTo(0, 0); }

  function render() {
    if (route.name === "home") renderHome();
    else renderDetail(route.id);
  }

  function renderHome() {
    var rows = db.tallies.slice().sort(function (a, b) { return b.updatedAt - a.updatedAt; });
    var html = '<header class="top"><span class="wordmark">tally</span>' +
      '<button class="reset" id="resetBtn" type="button">reset demo</button></header><main>';

    if (!rows.length) {
      html += '<div class="empty"><div class="glyph">||||&#x2044;</div><p>No tallies yet. A tally can hold notes, a checklist, reminders &mdash; whatever a thing needs. Start one with the &#43; button.</p></div>';
    } else {
      html += '<div class="list">';
      rows.forEach(function (t) {
        var total = t.notes.length + t.checklist.length + t.reminders.length;
        var open = t.checklist.filter(function (c) { return !c.done; }).length;
        var metaParts = [];
        if (t.notes.length) metaParts.push(t.notes.length + " note" + (t.notes.length > 1 ? "s" : ""));
        if (t.checklist.length) metaParts.push(open + "/" + t.checklist.length + " to do");
        if (!metaParts.length) metaParts.push("empty so far");
        var nr = nextReminder(t);
        html += '<button class="card" data-open="' + t.id + '">' +
          '<div class="title">' + esc(t.title) + "</div>" +
          '<div class="meta"><span class="meta-text">' + esc(metaParts.join(" &middot; ")) + "</span>" + tallyMarksSVG(total) + "</div>" +
          (nr ? '<span class="next-chip ' + dateClass(nr.date) + '">' + esc(fmtDate(nr.date)) + " &middot; " + esc(nr.text) + "</span>" : "") +
          "</button>";
      });
      html += "</div>";
    }
    html += "</main>";
    app.innerHTML = html;

    app.querySelectorAll("[data-open]").forEach(function (el) {
      el.addEventListener("click", function () { go({ name: "detail", id: el.getAttribute("data-open") }); });
    });
    document.getElementById("resetBtn").addEventListener("click", function () {
      if (confirm("Clear all demo data and reseed?")) { localStorage.removeItem(STORE_KEY); db = { tallies: [] }; seedIfEmpty(); render(); }
    });

    mountFab(function () {
      openSheet(
        '<h3>New tally</h3>' +
        '<div class="field"><label for="ntTitle">Title</label><input id="ntTitle" type="text" placeholder="e.g. Car problem, Grocery run" maxlength="80"></div>' +
        '<div class="sheet-actions"><button class="btn ghost" id="ntCancel" type="button">Cancel</button>' +
        '<button class="btn primary" id="ntSave" type="button" disabled>Create</button></div>',
        "#ntTitle"
      );
      var input = document.getElementById("ntTitle");
      var save_ = document.getElementById("ntSave");
      input.addEventListener("input", function () { save_.disabled = !input.value.trim(); });
      input.addEventListener("keydown", function (e) { if (e.key === "Enter" && input.value.trim()) save_.click(); });
      document.getElementById("ntCancel").addEventListener("click", closeSheet);
      save_.addEventListener("click", function () {
        var title = input.value.trim();
        if (!title) return;
        var now = Date.now();
        var t = { id: uid(), title: title, createdAt: now, updatedAt: now, notes: [], checklist: [], reminders: [] };
        db.tallies.unshift(t);
        save();
        closeSheet();
        go({ name: "detail", id: t.id });
      });
    });
  }

  function renderDetail(id) {
    var t = findTally(id);
    if (!t) { go({ name: "home" }); return; }

    var html = '<header class="top"><button class="back" id="backBtn" type="button">' + ICON.back + "</button>" +
      "<h1>" + esc(t.title) + "</h1></header><main>";

    // Reminders
    html += '<section class="block"><div class="block-head"><h2>Reminders</h2><span class="count">' + t.reminders.length + "</span></div>";
    html += '<div class="add-inline"><input type="date" id="remDate"><input type="text" id="remText" placeholder="What\'s due" maxlength="80">' +
      '<button class="go" id="remAdd" type="button" disabled>' + ICON.plus + "</button></div>";
    if (t.reminders.length) {
      t.reminders.slice().sort(function (a, b) { return a.date < b.date ? -1 : 1; }).forEach(function (r) {
        html += '<div class="item-row" data-kind="reminders" data-id="' + r.id + '">' +
          '<span class="reminder-date ' + dateClass(r.date) + '">' + esc(fmtDate(r.date)) + "</span>" +
          '<span class="item-text">' + esc(r.text) + "</span>" +
          '<button class="del" data-del="reminders:' + r.id + '" type="button">' + ICON.trash + "</button></div>";
      });
    } else {
      html += '<div class="block-empty">Nothing on the calendar for this one.</div>';
    }
    html += "</section>";

    // Checklist
    var openCount = t.checklist.filter(function (c) { return !c.done; }).length;
    html += '<section class="block"><div class="block-head"><h2>Checklist</h2><span class="count">' + openCount + "/" + t.checklist.length + "</span></div>";
    html += '<div class="add-inline"><input type="text" id="itemText" placeholder="Add an item" maxlength="120">' +
      '<button class="go" id="itemAdd" type="button" disabled>' + ICON.plus + "</button></div>";
    if (t.checklist.length) {
      t.checklist.forEach(function (c) {
        html += '<div class="item-row' + (c.done ? " done" : "") + '" data-kind="checklist" data-id="' + c.id + '">' +
          '<button class="checkbox' + (c.done ? " checked" : "") + '" data-toggle="' + c.id + '" type="button">' + ICON.check + "</button>" +
          '<span class="item-text">' + esc(c.text) + "</span>" +
          '<button class="del" data-del="checklist:' + c.id + '" type="button">' + ICON.trash + "</button></div>";
      });
    } else {
      html += '<div class="block-empty">No items yet.</div>';
    }
    html += "</section>";

    // Notes
    html += '<section class="block"><div class="block-head"><h2>Notes</h2><span class="count">' + t.notes.length + "</span></div>";
    html += '<div class="field" style="margin-bottom:12px"><textarea id="noteText" placeholder="Write something down&hellip;"></textarea>' +
      '<button class="btn primary" id="noteAdd" type="button" disabled style="align-self:flex-end;flex:none;padding:8px 18px;">Add note</button></div>';
    if (t.notes.length) {
      t.notes.slice().sort(function (a, b) { return b.createdAt - a.createdAt; }).forEach(function (n) {
        html += '<div class="item-row note-card" data-kind="notes" data-id="' + n.id + '">' +
          '<div class="item-text">' + esc(n.text) + '<div class="note-meta">' + new Date(n.createdAt).toLocaleDateString(undefined, { month: "short", day: "numeric" }) + "</div></div>" +
          '<button class="del" data-del="notes:' + n.id + '" type="button">' + ICON.trash + "</button></div>";
      });
    } else {
      html += '<div class="block-empty">Nothing written yet.</div>';
    }
    html += "</section></main>";

    app.innerHTML = html;
    document.getElementById("backBtn").addEventListener("click", function () { go({ name: "home" }); });

    // reminder add
    var remDate = document.getElementById("remDate"), remText = document.getElementById("remText"), remAdd = document.getElementById("remAdd");
    function syncRemBtn() { remAdd.disabled = !(remDate.value && remText.value.trim()); }
    remDate.addEventListener("input", syncRemBtn);
    remText.addEventListener("input", syncRemBtn);
    remText.addEventListener("keydown", function (e) { if (e.key === "Enter" && !remAdd.disabled) remAdd.click(); });
    remAdd.addEventListener("click", function () {
      t.reminders.push({ id: uid(), text: remText.value.trim(), date: remDate.value });
      touch(t); renderDetail(id);
    });

    // checklist add
    var itemText = document.getElementById("itemText"), itemAdd = document.getElementById("itemAdd");
    itemText.addEventListener("input", function () { itemAdd.disabled = !itemText.value.trim(); });
    itemText.addEventListener("keydown", function (e) { if (e.key === "Enter" && itemText.value.trim()) itemAdd.click(); });
    itemAdd.addEventListener("click", function () {
      t.checklist.push({ id: uid(), text: itemText.value.trim(), done: false });
      touch(t); renderDetail(id);
    });
    app.querySelectorAll("[data-toggle]").forEach(function (el) {
      el.addEventListener("click", function () {
        var c = t.checklist.find(function (x) { return x.id === el.getAttribute("data-toggle"); });
        c.done = !c.done; touch(t); renderDetail(id);
      });
    });

    // notes add
    var noteText = document.getElementById("noteText"), noteAdd = document.getElementById("noteAdd");
    noteText.addEventListener("input", function () { noteAdd.disabled = !noteText.value.trim(); });
    noteAdd.addEventListener("click", function () {
      t.notes.push({ id: uid(), text: noteText.value.trim(), createdAt: Date.now() });
      touch(t); renderDetail(id);
    });

    // deletes
    app.querySelectorAll("[data-del]").forEach(function (el) {
      el.addEventListener("click", function () {
        var parts = el.getAttribute("data-del").split(":");
        var arr = t[parts[0]];
        var idx = arr.findIndex(function (x) { return x.id === parts[1]; });
        if (idx > -1) arr.splice(idx, 1);
        touch(t); renderDetail(id);
      });
    });

    removeFab();
  }

  var fabEl = null;
  function mountFab(onClick) {
    removeFab();
    fabEl = document.createElement("button");
    fabEl.className = "fab";
    fabEl.type = "button";
    fabEl.setAttribute("aria-label", "New tally");
    fabEl.innerHTML = ICON.plus;
    fabEl.addEventListener("click", onClick);
    document.body.appendChild(fabEl);
  }
  function removeFab() { if (fabEl) { fabEl.remove(); fabEl = null; } }

  seedIfEmpty();
  render();
})();
</script>
