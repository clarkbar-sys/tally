name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history, so gitleaks can scan every commit

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt: files need formatting (run: make fmt)"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test -race ./...

      - name: gitleaks
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          "$(go env GOPATH)/bin/gitleaks" detect --config .gitleaks.toml --redact --no-banner
