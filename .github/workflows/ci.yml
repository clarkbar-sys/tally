name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: templ generate (verify up to date)
        run: |
          go run github.com/a-h/templ/cmd/templ@v0.3.977 generate
          if ! git diff --quiet -- '*_templ.go'; then
            echo "::error::generated templ output is stale (run: make generate, then commit)"
            git --no-pager diff --stat -- '*_templ.go'
            exit 1
          fi

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt: files need formatting (run: make fmt)"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        run: go build ./...

      - name: test
        run: go test -race ./...

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history, so gitleaks can scan every commit

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gitleaks
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          "$(go env GOPATH)/bin/gitleaks" detect --config .gitleaks.toml --redact --no-banner
