name: release-please

# release-please keeps a "Release PR" that bumps the version and updates
# CHANGELOG.md from Conventional Commits. Merge that PR -> it tags the release.
# When a release is cut, the `artifacts` job cross-builds the tally binary and
# attaches it to the GitHub Release, so install.sh can fetch a prebuilt binary
# (no Go toolchain / git clone on the box). Lean: no checksums / SBOM / signing.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  artifacts:
    name: Build & attach release artifacts (${{ matrix.os }}/${{ matrix.arch }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # tally embeds the web/ UI (templ) and uses modernc.org/sqlite (pure Go),
      # so it cross-compiles clean with CGO disabled. install.sh expects exactly
      # this "tally_<os>_<arch>.tar.gz" naming on the release.
      - name: Build release artifact
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          # The tag being released, e.g. "v1.2.0" — stamped into the binary so
          # `version.String()` reports what's actually running.
          VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          mkdir -p out
          ldflags="-s -w -X github.com/clarkbar-sys/tally/internal/version.Version=${VERSION}"
          go build -trimpath -ldflags="$ldflags" -o out/tally ./cmd/tally
          tar -C out -czf "out/tally_${{ matrix.os }}_${{ matrix.arch }}.tar.gz" tally
          rm out/tally

      - name: Attach to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" out/*.tar.gz --clobber
