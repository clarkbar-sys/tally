name: pages

# Builds the real, server-rendered UI as a static site (cmd/tally -export,
# driven by the demo adapter -- no credentials, no network) and deploys it to
# the gh-pages branch: production at the branch root on push to main, and a
# per-PR preview under pr-<number>/ for same-repo pull requests. The preview is
# the actual app, not a hand-maintained mockup, so it can never drift from what
# ships. Anything under design/ (throwaway click-through spikes) is copied in
# alongside it and linked from the PR comment separately, so a spike is
# viewable on a phone without touching the app build. Requires a one-time repo
# setting change -- see CONTRIBUTING.md's "GitHub Pages" section.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Production: build the UI and publish it to the gh-pages branch root on push
  # to main. exclude_assets protects live pr-*/ preview folders from being swept
  # by the same-repo cleanup this job otherwise does for removed root files.
  deploy-production:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build static site
        run: go run ./cmd/tally -export ./_site
      - name: include design spikes
        run: '[ -d design ] && cp -r design ./_site/design || true'
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: false
          exclude_assets: "pr-*"

  # Preview: same-repo PRs get the built UI published under pr-<number>/, with a
  # sticky comment linking to it. Forked PRs are skipped -- their GITHUB_TOKEN is
  # read-only and can't push to gh-pages.
  deploy-preview:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build static site
        run: go run ./cmd/tally -export ./_site
      - name: include design spikes
        run: '[ -d design ] && cp -r design ./_site/design || true'
      - name: list design spikes
        id: spikes
        run: |
          base="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/design"
          block=""
          if [ -d design ]; then
            for f in design/*.html; do
              [ -e "$f" ] || continue
              block="$(printf '%s- [%s](%s/%s)\n' "$block" "$(basename "$f")" "$base" "$(basename "$f")")"
            done
          fi
          # GitHub Actions expressions don't interpret \n in string literals, so
          # any leading blank line before "Design spikes:" has to be a real
          # newline built here in bash, not in the message: template below.
          if [ -n "$block" ]; then
            block="$(printf 'Design spikes:\n%s' "$block")"
          fi
          {
            echo 'links<<SPIKES_EOF'
            printf '%s\n' "$block"
            echo 'SPIKES_EOF'
          } >> "$GITHUB_OUTPUT"
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pages-preview
          message: |
            Preview (real UI, demo data): https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/

            ${{ steps.spikes.outputs.links }}

  # Cleanup: remove a PR's preview folder from gh-pages once it closes, so stale
  # previews don't accumulate.
  cleanup-preview:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
      - run: |
          rm -rf "pr-${{ github.event.pull_request.number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "pages: remove preview for closed PR #${{ github.event.pull_request.number }}"
          git push
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pages-preview
          delete: true
