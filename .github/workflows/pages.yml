name: pages

# Publishes the design spike(s) under design/ as the site itself. tally's v1 is
# local-first and client-only (see epic #1's pivot), so the public site IS the
# click-through prototype -- there's no server build to deploy. The primary
# spike (design/tally-spike.html) is served as the site's index.html; every
# file under design/ is also published by its own name. Deployed to the
# gh-pages branch: production at the branch root on push to main, and a per-PR
# preview under pr-<number>/ for same-repo pull requests. Requires a one-time
# repo setting change -- see CONTRIBUTING.md's "GitHub Pages" section.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Production: publish the spike to the gh-pages branch root on push to main.
  # exclude_assets protects live pr-*/ preview folders from being swept by the
  # same-repo cleanup this job otherwise does for removed root files.
  deploy-production:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: assemble site from design spikes
        run: |
          mkdir -p ./_site
          cp design/*.html ./_site/
          cp design/tally-spike.html ./_site/index.html
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: false
          exclude_assets: "pr-*"

  # Preview: same-repo PRs get the spike published under pr-<number>/, with a
  # sticky comment linking to it. Forked PRs are skipped -- their GITHUB_TOKEN is
  # read-only and can't push to gh-pages.
  deploy-preview:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: assemble site from design spikes
        run: |
          mkdir -p ./_site
          cp design/*.html ./_site/
          cp design/tally-spike.html ./_site/index.html
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pages-preview
          message: |
            Live preview (the tally spike): https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/

  # Cleanup: remove a PR's preview folder from gh-pages once it closes, so stale
  # previews don't accumulate.
  cleanup-preview:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
      - run: |
          rm -rf "pr-${{ github.event.pull_request.number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "pages: remove preview for closed PR #${{ github.event.pull_request.number }}"
          git push
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pages-preview
          delete: true
